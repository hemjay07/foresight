<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#09090B"/>

  <!-- Crosshair -->
  <line x1="0" y1="16" x2="32" y2="16"
        stroke="#F59E0B" stroke-width="0.5" opacity="0.5"/>

  <!-- Eye outline -->
  <path d="M1.5,16 C7,8 25,8 30.5,16 C25,24 7,24 1.5,16 Z"
        stroke="#F59E0B" stroke-width="1.2"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="7.5"
          stroke="#F59E0B" stroke-width="1" opacity="0.85"/>

  <!-- Middle ring -->
  <circle cx="16" cy="16" r="5"
          stroke="#F59E0B" stroke-width="0.9" opacity="0.7"/>

  <!-- Inner pupil -->
  <circle cx="16" cy="16" r="3.4" fill="#09090B"/>

  <!-- Gold chevron -->
  <path d="M13.5,17.5 L16,13.5 L18.5,17.5"
        stroke="#F59E0B" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
