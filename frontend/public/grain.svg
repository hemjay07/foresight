<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" seed="2" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
    </filter>
  </defs>

  <!-- Base texture using procedural noise -->
  <rect width="256" height="256" fill="#000000" filter="url(#noise)" opacity="0.8"/>

  <!-- Add some random grain dots for more texture -->
  <g opacity="0.6">
    <circle cx="12" cy="18" r="1"/>
    <circle cx="45" cy="32" r="1"/>
    <circle cx="78" cy="52" r="0.8"/>
    <circle cx="102" cy="28" r="1"/>
    <circle cx="145" cy="65" r="0.9"/>
    <circle cx="178" cy="12" r="1"/>
    <circle cx="220" cy="88" r="0.8"/>
    <circle cx="32" cy="102" r="1"/>
    <circle cx="88" cy="125" r="0.9"/>
    <circle cx="155" cy="98" r="1"/>
    <circle cx="198" cy="145" r="0.8"/>
    <circle cx="22" cy="168" r="1"/>
    <circle cx="68" cy="188" r="0.9"/>
    <circle cx="125" cy="202" r="1"/>
    <circle cx="178" cy="178" r="0.8"/>
    <circle cx="228" cy="222" r="1"/>
    <circle cx="52" cy="235" r="0.9"/>
    <circle cx="15" cy="115" r="1"/>
