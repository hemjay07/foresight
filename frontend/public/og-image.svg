<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Radial glow behind wordmark -->
    <radialGradient id="glow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grain texture via feTurbulence -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090B"/>

  <!-- Noise overlay — very subtle -->
  <rect width="1200" height="630" fill="#09090B" filter="url(#grain)" opacity="0.04"/>

  <!-- Radial glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top gold rule -->
  <rect x="0" y="0" width="1200" height="3" fill="#F59E0B" opacity="0.9"/>

  <!-- Bottom gold rule -->
  <rect x="0" y="627" width="1200" height="3" fill="#F59E0B" opacity="0.4"/>

  <!-- Left decorative bracket -->
  <rect x="72" y="72" width="32" height="3" fill="#F59E0B" opacity="0.5"/>
  <rect x="72" y="72" width="3" height="32" fill="#F59E0B" opacity="0.5"/>
  <rect x="72" y="555" width="32" height="3" fill="#F59E0B" opacity="0.5"/>
  <rect x="72" y="523" width="3" height="35" fill="#F59E0B" opacity="0.5"/>

  <!-- Right decorative bracket -->
  <rect x="1096" y="72" width="32" height="3" fill="#F59E0B" opacity="0.5"/>
  <rect x="1125" y="72" width="3" height="32" fill="#F59E0B" opacity="0.5"/>
  <rect x="1096" y="555" width="32" height="3" fill="#F59E0B" opacity="0.5"/>
  <rect x="1125" y="523" width="3" height="35" fill="#F59E0B" opacity="0.5"/>

  <!-- Eye mark — matches logo.svg proportions scaled up -->
  <!-- Crosshair -->
  <line x1="510" y1="198" x2="690" y2="198" stroke="#F59E0B" stroke-width="0.8" opacity="0.38"/>
  <!-- Eye outline -->
  <path d="M510,198 C534,157 666,157 690,198 C666,239 534,239 510,198 Z"
        fill="none" stroke="#F59E0B" stroke-width="2.2" opacity="0.82"/>
  <!-- Outer ring -->
  <circle cx="600" cy="198" r="35" fill="none" stroke="#F59E0B" stroke-width="1.8" opacity="0.58"/>
  <!-- Middle ring -->
  <circle cx="600" cy="198" r="23.5" fill="none" stroke="#F59E0B" stroke-width="1.6" opacity="0.40"/>
  <!-- Inner pupil — dark fill -->
  <circle cx="600" cy="198" r="16" fill="#09090B"/>
  <circle cx="600" cy="198" r="16" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.28"/>
  <!-- Gold chevron -->
  <path d="M587,206 L600,189 L613,206"
        fill="none" stroke="#F59E0B" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text
    x="600" y="326"
    font-family="'Inter', 'Arial Black', Arial, sans-serif"
    font-weight="800"
    font-size="86"
    fill="#FAFAFA"
    text-anchor="middle"
    letter-spacing="-2"
  >FORESIGHT</text>

  <!-- Gold underline -->
  <rect x="430" y="345" width="340" height="3" fill="#F59E0B" rx="2"/>

  <!-- Tagline -->
  <text
    x="600" y="408"
    font-family="'Inter', Arial, sans-serif"
    font-weight="400"
    font-size="28"
    fill="#A1A1AA"
    text-anchor="middle"
    letter-spacing="6"
  >FANTASY SPORTS FOR CRYPTO TWITTER</text>

  <!-- Stats preview row -->
  <rect x="252" y="462" width="200" height="72" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="352" y="492" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="13" fill="#F59E0B" text-anchor="middle" letter-spacing="2">SEASON RANK</text>
  <text x="352" y="521" font-family="'Inter', Arial, sans-serif" font-weight="800" font-size="26" fill="#FAFAFA" text-anchor="middle">#2</text>

  <rect x="500" y="462" width="200" height="72" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="600" y="492" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="13" fill="#F59E0B" text-anchor="middle" letter-spacing="2">FORESIGHT SCORE</text>
  <text x="600" y="521" font-family="'Inter', Arial, sans-serif" font-weight="800" font-size="26" fill="#FAFAFA" text-anchor="middle">1,151 FS</text>

  <rect x="748" y="462" width="200" height="72" rx="10" fill="#18181B" stroke="#27272A" stroke-width="1"/>
  <text x="848" y="492" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="13" fill="#F59E0B" text-anchor="middle" letter-spacing="2">MULTIPLIER</text>
  <text x="848" y="521" font-family="'Inter', Arial, sans-serif" font-weight="800" font-size="26" fill="#FAFAFA" text-anchor="middle">1.58×</text>

  <!-- URL -->
  <text
    x="600" y="597"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="18"
    fill="#3F3F46"
    text-anchor="middle"
    letter-spacing="1"
  >ct-foresight.xyz</text>
</svg>
