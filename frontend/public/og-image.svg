<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Central glow behind formation -->
    <radialGradient id="glow" cx="65%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <!-- Pitch-like radial behind formation -->
    <radialGradient id="pitchGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#10B981" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <!-- Grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Tier ring glows -->
    <filter id="glowS"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowA"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowB"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="#09090B" filter="url(#grain)" opacity="0.04"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top gold rule -->
  <rect x="0" y="0" width="1200" height="3" fill="#F59E0B" opacity="0.9"/>
  <!-- Bottom gold rule -->
  <rect x="0" y="627" width="1200" height="3" fill="#F59E0B" opacity="0.4"/>

  <!-- Corner brackets -->
  <rect x="40" y="40" width="28" height="2.5" fill="#F59E0B" opacity="0.5"/>
  <rect x="40" y="40" width="2.5" height="28" fill="#F59E0B" opacity="0.5"/>
  <rect x="40" y="588" width="28" height="2.5" fill="#F59E0B" opacity="0.5"/>
  <rect x="40" y="560" width="2.5" height="30" fill="#F59E0B" opacity="0.5"/>
  <rect x="1132" y="40" width="28" height="2.5" fill="#F59E0B" opacity="0.5"/>
  <rect x="1157.5" y="40" width="2.5" height="28" fill="#F59E0B" opacity="0.5"/>
  <rect x="1132" y="588" width="28" height="2.5" fill="#F59E0B" opacity="0.5"/>
  <rect x="1157.5" y="560" width="2.5" height="30" fill="#F59E0B" opacity="0.5"/>

  <!-- ===== LEFT SIDE: BRANDING ===== -->

  <!-- Eye logo (scaled) -->
  <g transform="translate(240, 165) scale(1.8)">
    <line x1="0" y1="50" x2="100" y2="50" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
    <path d="M4,50 C20,24 80,24 96,50 C80,76 20,76 4,50 Z" fill="none" stroke="#F59E0B" stroke-width="2.5" opacity="0.82"/>
    <circle cx="50" cy="50" r="24" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.55"/>
    <circle cx="50" cy="50" r="16" fill="none" stroke="#F59E0B" stroke-width="1.8" opacity="0.35"/>
    <circle cx="50" cy="50" r="11.5" fill="#09090B"/>
    <path d="M43,55 L50,46 L57,55" fill="none" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- FORESIGHT wordmark -->
  <text x="330" y="365" font-family="'Inter','Arial Black',Arial,sans-serif" font-weight="800" font-size="58" fill="#FAFAFA" text-anchor="middle" letter-spacing="-1">FORESIGHT</text>

  <!-- Gold underline -->
  <rect x="160" y="380" width="340" height="2.5" fill="#F59E0B" rx="1"/>

  <!-- Tagline -->
  <text x="330" y="418" font-family="'Inter',Arial,sans-serif" font-weight="500" font-size="16" fill="#A1A1AA" text-anchor="middle" letter-spacing="4">BACK CT CALLS. GET PAID.</text>

  <!-- CTA line -->
  <rect x="218" y="458" width="224" height="42" rx="21" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
  <text x="330" y="484" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="15" fill="#F59E0B" text-anchor="middle" letter-spacing="1">DRAFT YOUR TEAM</text>

  <!-- Prize info -->
  <text x="330" y="530" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="14" fill="#71717A" text-anchor="middle" letter-spacing="1">FREE ENTRY  ·  WIN SOL PRIZES</text>

  <!-- URL -->
  <text x="330" y="575" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" fill="#3F3F46" text-anchor="middle" letter-spacing="1">ct-foresight.xyz</text>

  <!-- ===== RIGHT SIDE: FORMATION CARD ===== -->

  <!-- Card background -->
  <rect x="620" y="65" width="520" height="500" rx="20" fill="#12121A" stroke="#27272A" stroke-width="1"/>

  <!-- Subtle pitch glow inside card -->
  <rect x="620" y="65" width="520" height="500" rx="20" fill="url(#pitchGlow)"/>

  <!-- Card header -->
  <text x="880" y="110" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="18" fill="#F59E0B" text-anchor="middle" letter-spacing="4">CT DRAFT</text>
  <rect x="790" y="120" width="180" height="1" fill="#F59E0B" opacity="0.3"/>

  <!-- ===== 1-2-2 PYRAMID FORMATION ===== -->

  <!-- Row 1: Captain (top center) -->
  <!-- Captain glow ring -->
  <circle cx="880" cy="195" r="42" fill="none" stroke="#F59E0B" stroke-width="2.5" filter="url(#glowS)" opacity="0.8"/>
  <circle cx="880" cy="195" r="38" fill="#1A1A24" stroke="#F59E0B" stroke-width="2"/>
  <!-- Crown badge -->
  <path d="M866,160 L871,168 L876,162 L880,170 L884,162 L889,168 L894,160 L892,174 L868,174 Z" fill="#F59E0B"/>
  <!-- S tier badge -->
  <circle cx="912" cy="177" r="11" fill="#F59E0B"/>
  <text x="912" y="182" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="12" fill="#09090B" text-anchor="middle">S</text>
  <!-- Captain label -->
  <text x="880" y="250" font-family="'Inter',Arial,sans-serif" font-weight="700" font-size="13" fill="#FAFAFA" text-anchor="middle">Captain</text>
  <text x="880" y="265" font-family="'Inter',Arial,sans-serif" font-weight="400" font-size="11" fill="#71717A" text-anchor="middle">2x Multiplier</text>

  <!-- Row 2: Two A-tier slots -->
  <!-- Left A slot -->
  <circle cx="770" cy="330" r="36" fill="none" stroke="#06B6D4" stroke-width="2" filter="url(#glowA)" opacity="0.7"/>
  <circle cx="770" cy="330" r="32" fill="#1A1A24" stroke="#06B6D4" stroke-width="1.5"/>
  <circle cx="800" cy="314" r="10" fill="#06B6D4"/>
  <text x="800" y="319" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="11" fill="#09090B" text-anchor="middle">A</text>
  <text x="770" y="380" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="12" fill="#A1A1AA" text-anchor="middle">A-Tier</text>

  <!-- Right A slot -->
  <circle cx="990" cy="330" r="36" fill="none" stroke="#06B6D4" stroke-width="2" filter="url(#glowA)" opacity="0.7"/>
  <circle cx="990" cy="330" r="32" fill="#1A1A24" stroke="#06B6D4" stroke-width="1.5"/>
  <circle cx="1020" cy="314" r="10" fill="#06B6D4"/>
  <text x="1020" y="319" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="11" fill="#09090B" text-anchor="middle">A</text>
  <text x="990" y="380" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="12" fill="#A1A1AA" text-anchor="middle">A-Tier</text>

  <!-- Row 3: B-tier + C-tier slots -->
  <!-- Left B slot -->
  <circle cx="770" cy="455" r="32" fill="none" stroke="#10B981" stroke-width="1.5" filter="url(#glowB)" opacity="0.6"/>
  <circle cx="770" cy="455" r="28" fill="#1A1A24" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="796" cy="441" r="9" fill="#10B981"/>
  <text x="796" y="446" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="10" fill="#09090B" text-anchor="middle">B</text>
  <text x="770" y="500" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="12" fill="#A1A1AA" text-anchor="middle">B-Tier</text>

  <!-- Right C slot -->
  <circle cx="990" cy="455" r="32" fill="none" stroke="#71717A" stroke-width="1.5" opacity="0.5"/>
  <circle cx="990" cy="455" r="28" fill="#1A1A24" stroke="#71717A" stroke-width="1.5"/>
  <circle cx="1016" cy="441" r="9" fill="#71717A"/>
  <text x="1016" y="446" font-family="'Inter',Arial,sans-serif" font-weight="800" font-size="10" fill="#09090B" text-anchor="middle">C</text>
  <text x="990" y="500" font-family="'Inter',Arial,sans-serif" font-weight="600" font-size="12" fill="#A1A1AA" text-anchor="middle">C-Tier</text>

  <!-- Formation connecting lines (subtle) -->
  <line x1="880" y1="237" x2="770" y2="294" stroke="#27272A" stroke-width="1" opacity="0.4"/>
  <line x1="880" y1="237" x2="990" y2="294" stroke="#27272A" stroke-width="1" opacity="0.4"/>
  <line x1="770" y1="366" x2="770" y2="423" stroke="#27272A" stroke-width="1" opacity="0.3"/>
  <line x1="990" y1="366" x2="990" y2="423" stroke="#27272A" stroke-width="1" opacity="0.3"/>

  <!-- Card footer -->
  <text x="880" y="545" font-family="'Inter',Arial,sans-serif" font-weight="500" font-size="11" fill="#3F3F46" text-anchor="middle" letter-spacing="2">POWERED BY TAPESTRY PROTOCOL</text>
</svg>
