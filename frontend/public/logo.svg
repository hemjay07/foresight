<svg xmlns="http://www.w3.org/2000/svg" viewBox="2 22 96 56" fill="none">
  <!--
    Foresight logo — eye/aperture mark
    Transparent background, gold on dark surfaces
  -->

  <!-- Crosshair line — extends through both tips -->
  <line x1="0" y1="50" x2="100" y2="50"
        stroke="#F59E0B" stroke-width="1.5" opacity="0.55"/>

  <!-- Eye outline — wide almond, matches AI proportions -->
  <path d="M4,50 C20,24 80,24 96,50 C80,76 20,76 4,50 Z"
        stroke="#F59E0B" stroke-width="3.2"/>

  <!-- Outer iris ring -->
  <circle cx="50" cy="50" r="24"
          stroke="#F59E0B" stroke-width="2.8"/>

  <!-- Middle iris ring -->
  <circle cx="50" cy="50" r="16"
          stroke="#F59E0B" stroke-width="2.4"/>

  <!-- Inner pupil — large dark fill, matches AI where dark circle is prominent -->
  <circle cx="50" cy="50" r="11.5" fill="#09090B"/>

  <!-- Gold chevron — open, rounded ends -->
  <path d="M43,55 L50,46 L57,55"
        stroke="#F59E0B" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
