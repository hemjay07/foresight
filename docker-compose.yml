version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: foresight-db
    environment:
      POSTGRES_USER: foresight
      POSTGRES_PASSWORD: foresight123
      POSTGRES_DB: foresight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foresight"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
